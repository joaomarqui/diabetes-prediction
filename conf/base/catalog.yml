# ==========================================
# Data Catalog - Diabetes Prediction Project
# ==========================================
# ALL CSVDatasets use save_args: {index: false} to avoid
# the "Unnamed: 0" index column issue when loading back.

# --- 01_raw (read only — no save_args needed) ---

raw_diabetes_modelling:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes-dataset-modelling.csv

raw_diabetes_inference:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes-dataset-inference.csv

raw_inference_data:
  type: pandas.CSVDataset
  filepath: data/01_raw/diabetes-dataset-inference.csv

